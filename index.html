<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안산 LG유플러스 체인지 페스티벌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        let db = null;
        let auth = null;
        let userId = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ansan-uplus-festival';

        // 시스템 초기화
        async function initSystem() {
            try {
                const firebaseConfig = typeof __firebase_config !== 'undefined' 
                    ? JSON.parse(__firebase_config) 
                    : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // 인증 처리
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        updateStatus(true);
                    }
                });
            } catch (error) {
                console.error("연결 실패:", error);
                updateStatus(false);
            }
        }

        function updateStatus(isOnline) {
            const badge = document.getElementById('status-badge');
            if (badge) {
                badge.className = isOnline ? "w-2.5 h-2.5 rounded-full bg-green-500 mr-2 shadow-[0_0_8px_rgba(34,197,94,0.8)]" : "w-2.5 h-2.5 rounded-full bg-red-500 mr-2";
            }
        }

        initSystem();

        // 상담 신청 전송
        window.submitConsultation = async function(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button');
            const originalText = btn.innerText;

            if (!db || !userId) {
                btn.innerText = "연결 재시도...";
                await initSystem();
                if (!db || !userId) {
                    alert("인터넷 연결을 확인해주세요.");
                    btn.innerText = originalText;
                    return;
                }
            }

            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const type = document.getElementById('consult-type').value;

            btn.innerText = "등록 중...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leads'), {
                    name, phone, type, createdAt: serverTimestamp()
                });
                document.getElementById('consult-form').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (e) {
                alert("등록 오류! 실장님께 전화주세요.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 자물쇠(관리자) 팝업 열기/닫기
        window.toggleAdmin = function() {
            const panel = document.getElementById('admin-panel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                loadLeads();
            } else {
                panel.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        }

        function loadLeads() {
            if (!db || !userId) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'leads');
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('leads-list');
                list.innerHTML = '';
                const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                if (docs.length === 0) {
                    list.innerHTML = '<p class="text-white/40 text-center py-20">아직 신청자가 없습니다.</p>';
                    return;
                }

                docs.forEach(data => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-2xl mb-4 shadow-xl border-l-[8px] border-[#E6007E] fade-in";
                    const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '방금 전';
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-slate-800 text-lg">${data.name} 고객님</span>
                            <span class="text-[10px] text-slate-400 font-mono">${date}</span>
                        </div>
                        <div class="text-[#E6007E] font-black text-2xl mb-2 tracking-tight">
                            <a href="tel:${data.phone}">${data.phone}</a>
                        </div>
                        <div class="text-xs text-slate-500 bg-slate-50 p-2 rounded-lg flex items-center gap-2">
                            <i class="fas fa-check-circle text-slate-300"></i> ${data.type}
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }
    </script>
    <style>
        .magenta-btn { background-color: #E6007E; }
        .bg-ansan { background-color: #001D4A; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden pb-20">

    <!-- Header -->
    <nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md shadow-sm px-4 h-16 flex items-center justify-between max-w-4xl mx-auto left-0 right-0 border-b border-slate-100">
        <div class="flex items-center gap-1">
            <div id="status-badge" class="w-2.5 h-2.5 rounded-full bg-slate-300 mr-2 transition-colors duration-500"></div>
            <div class="w-8 h-8 magenta-btn rounded-full flex items-center justify-center font-bold text-white italic text-[11px] shadow-sm">U+</div>
            <span class="font-black text-lg tracking-tighter">안산 체인지 페스티벌</span>
        </div>
        <button onclick="toggleAdmin()" class="w-12 h-12 flex items-center justify-center text-slate-300 hover:text-[#E6007E] transition-all">
            <i class="fas fa-lock text-xl"></i>
        </button>
    </nav>

    <!-- Hero -->
    <section class="pt-24 pb-16 px-6 bg-ansan text-white text-center relative">
        <div class="max-w-4xl mx-auto">
            <div class="inline-block bg-[#E6007E] rounded-full px-4 py-1 text-[10px] font-bold mb-4 shadow-lg animate-bounce">3/6 오늘 정식 런칭!</div>
            <h1 class="text-3xl font-black mb-4 leading-tight italic">안산 시민의 새로운 시작,<br><span class="text-[#E6007E]">유플러스</span>가 함께 합니다.</h1>
            <p class="text-blue-200 text-sm opacity-90 mb-8 font-medium">반월공단 근로자 우대 & 자녀 안심 요금 설계</p>
            <div class="bg-white/5 rounded-3xl p-8 border border-white/10 shadow-2xl backdrop-blur-sm">
                <i class="fas fa-mobile-screen text-6xl text-[#E6007E] mb-4"></i>
                <p class="text-xl font-bold underline underline-offset-8 decoration-[#E6007E]">안산 최대 지원 혜택 적용</p>
            </div>
        </div>
    </section>

    <!-- Form Section -->
    <section id="consult" class="px-6 -mt-10 relative z-10 pb-12">
        <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
            <div id="consult-form">
                <h2 class="text-2xl font-black text-center mb-1 text-slate-800">상담 신청 명단 등록</h2>
                <p class="text-center text-slate-400 text-[11px] mb-8">번호만 남기시면 실장님이 직접 설계해 드립니다.</p>
                
                <form onsubmit="submitConsultation(event)" class="space-y-4">
                    <div class="text-left">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">신청인 성함</label>
                        <input id="name" type="text" placeholder="성함을 입력해주세요" required class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-[#E6007E] text-sm">
                    </div>
                    <div class="text-left">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">연락처</label>
                        <input id="phone" type="tel" placeholder="010-0000-0000" required class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-[#E6007E] text-sm">
                    </div>
                    <div class="text-left">
                        <label class="text-[10px] font-bold text-slate-400 ml-2">희망 상담 내용</label>
                        <select id="consult-type" class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-[#E6007E] text-sm appearance-none">
                            <option>가장 저렴한 요금제 찾아주세요</option>
                            <option>반월공단 사원증 추가 할인</option>
                            <option>우리 아이 첫 스마트폰 상담</option>
                            <option>주말 매장 방문 예약</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full magenta-btn text-white font-black py-5 rounded-[1.5rem] text-lg shadow-xl shadow-pink-200 mt-4 active:scale-95 transition-all">
                        신청하고 혜택 챙기기
                    </button>
                </form>
            </div>

            <!-- Success -->
            <div id="success-msg" class="hidden text-center py-10 fade-in">
                <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                    <i class="fas fa-check text-3xl"></i>
                </div>
                <h3 class="text-2xl font-black mb-2 text-slate-800">신청 완료!</h3>
                <p class="text-slate-500 text-sm mb-6 font-medium">실장 임시환이 확인 후<br>곧 연락드리겠습니다.</p>
                <div class="bg-blue-50 p-4 rounded-2xl text-blue-600 text-[11px] font-bold border border-blue-100 animate-bounce">
                    ☕ 상담 신청 감사 커피 쿠폰 발송 완료!
                </div>
            </div>
        </div>
    </section>

    <!-- Admin Panel (팝업 화면 깨짐 방지 레이아웃) -->
    <div id="admin-panel" class="hidden fixed inset-0 z-[100] bg-slate-900/98 backdrop-blur-md p-4 overflow-y-auto">
        <div class="max-w-md mx-auto pt-8 pb-32">
            <div class="flex justify-between items-end mb-8 text-white px-2">
                <div>
                    <h2 class="text-3xl font-black mb-1">상담 대기열</h2>
                    <p class="text-xs text-white/50 flex items-center gap-1 font-medium">
                        <i class="fas fa-user-shield"></i> 안산 상록롯데마트점 실장 전용
                    </p>
                </div>
                <button onclick="toggleAdmin()" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center active:scale-90 transition-all border border-white/10">
                    <i class="fas fa-times text-xl text-white"></i>
                </button>
            </div>
            
            <div id="leads-list" class="space-y-4">
                <!-- 명단이 여기에 나타납니다 -->
            </div>
        </div>
    </div>

    <!-- Floating Footer -->
    <div class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t p-4 flex gap-3 z-50 max-w-4xl mx-auto right-0 shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
        <a href="tel:01077119870" class="flex-1 magenta-btn text-white py-4 rounded-2xl font-black text-center flex items-center justify-center gap-2 shadow-xl shadow-pink-200 active:scale-95 transition-all">
            <i class="fas fa-phone-alt"></i> 실장님 바로 연결
        </a>
    </div>

</body>
</html>
