<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U+ 다이렉트샵 | 안산 상록롯데마트점</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .magenta-btn { background-color: #E6007E; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-24 overflow-x-hidden text-left">

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md shadow-sm h-16 flex items-center px-4 max-w-4xl mx-auto left-0 right-0 border-b border-slate-100">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 magenta-btn rounded-lg flex items-center justify-center shadow-lg transform rotate-3">
                <span class="text-white font-black italic text-xs">U+</span>
            </div>
            <span class="font-black text-xl tracking-tighter uppercase">Direct Shop</span>
        </div>
    </header>

    <!-- Hero Section (이미지 연동) -->
    <section class="pt-16 relative">
        <div class="relative w-full aspect-[16/10] md:aspect-[21/9] bg-[#E9EBF2] overflow-hidden">
            <!-- [중요] 실장님의 파일명 s26_banner.jpg.png 에 정확히 맞췄습니다 -->
            <img src="s26_banner.jpg.png" alt="Galaxy S26 Series" class="w-full h-full object-cover object-center" onerror="this.src='https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?auto=format&fit=crop&q=80&w=2000'">
            
            <div class="absolute inset-0 bg-gradient-to-r from-white/60 via-transparent to-transparent flex flex-col justify-center p-6 md:p-16">
                <div class="max-w-4xl mx-auto w-full fade-in">
                    <div class="flex items-center gap-2 bg-black text-white w-fit px-3 py-1 rounded-full text-[10px] font-bold mb-4 shadow-xl">
                        <i class="fas fa-sparkles text-yellow-400"></i> NEW GALAXY AI
                    </div>
                    <h1 class="text-4xl md:text-7xl font-black mb-2 leading-none tracking-tighter">
                        Galaxy S26 <br>
                        <span class="text-[#E6007E]">Ultra</span>
                    </h1>
                    <p class="text-lg md:text-2xl font-bold text-slate-800 mb-6 max-w-lg leading-tight">
                        안산 상록롯데마트점 단독,<br>
                        <span class="underline decoration-[#E6007E] decoration-4 underline-offset-4 font-black">구매 혜택 역대급 공개!</span>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Features -->
    <section class="py-10 px-5 max-w-4xl mx-auto -mt-8 relative z-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex flex-col items-center text-center">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center mb-3 text-lg"><i class="fas fa-language"></i></div>
                <h4 class="font-bold text-[11px]">실시간 통번역</h4>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex flex-col items-center text-center">
                <div class="w-10 h-10 bg-purple-50 text-purple-500 rounded-xl flex items-center justify-center mb-3 text-lg"><i class="fas fa-search"></i></div>
                <h4 class="font-bold text-[11px]">서클 투 서치</h4>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex flex-col items-center text-center">
                <div class="w-10 h-10 bg-pink-50 text-[#E6007E] rounded-xl flex items-center justify-center mb-3 text-lg"><i class="fas fa-camera"></i></div>
                <h4 class="font-bold text-[11px]">2억 화소 카메라</h4>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex flex-col items-center text-center">
                <div class="w-10 h-10 bg-yellow-50 text-yellow-600 rounded-xl flex items-center justify-center mb-3 text-lg"><i class="fas fa-gift"></i></div>
                <h4 class="font-bold text-[11px]">단독 사은품</h4>
            </div>
        </div>
    </section>

    <!-- Form Section -->
    <section id="consult" class="py-10 px-5 max-w-4xl mx-auto">
        <div class="bg-slate-900 rounded-[3rem] p-8 md:p-16 shadow-2xl text-white relative overflow-hidden text-center">
            <div class="mb-12 relative z-10">
                <h2 class="text-3xl md:text-5xl font-black mb-4">S26 특별 혜택 신청</h2>
                <p class="text-slate-400 text-sm md:text-base">지금 신청하시면 임시환 실장이 직접 연락드려 <br>단독 혜택을 설계해 드립니다.</p>
            </div>

            <form onsubmit="event.preventDefault(); document.getElementById('success').classList.remove('hidden'); this.classList.add('hidden');" class="space-y-4 max-w-md mx-auto relative z-10">
                <input type="text" placeholder="고객님 성함" required class="w-full bg-white/10 border border-white/10 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-[#E6007E] text-white">
                <input type="tel" placeholder="휴대폰 번호" required class="w-full bg-white/10 border border-white/10 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-[#E6007E] text-white">
                <select class="w-full bg-white/10 border border-white/10 p-5 rounded-2xl outline-none focus:ring-2 focus:ring-[#E6007E] text-white appearance-none cursor-pointer">
                    <option class="bg-slate-900">Galaxy S26 Ultra 상담</option>
                    <option class="bg-slate-900">S26 / S26+ 상담</option>
                    <option class="bg-slate-900">반월공단 사원증 할인 문의</option>
                    <option class="bg-slate-900">자녀 안심 요금제 설계</option>
                </select>
                <button type="submit" class="w-full magenta-btn text-white py-5 rounded-[1.8rem] font-black text-xl shadow-2xl active:scale-95 transition-all">S26 다이렉트 혜택 확인</button>
            </form>

            <div id="success" class="hidden text-center py-10 fade-in">
                <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl"><i class="fas fa-check text-4xl"></i></div>
                <h3 class="text-2xl font-bold mb-2">신청이 완료되었습니다!</h3>
                <p class="text-slate-400">실장님이 확인 후 곧 연락드리겠습니다.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-16 px-5 max-w-4xl mx-auto text-center border-t border-slate-100">
        <div class="w-16 h-16 bg-slate-50 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-sm"><i class="fas fa-map-marker-alt text-[#E6007E] text-2xl"></i></div>
        <h3 class="text-xl font-black text-slate-900 mb-2 underline decoration-[#E6007E] decoration-4 underline-offset-4">안산 상록롯데마트점 1층 본사직영</h3>
        <p class="text-slate-500 text-sm leading-relaxed mb-6">안산 성포동 586 롯데마트 1층 (에스컬레이터 옆)<br><span class="font-bold text-slate-800">실장 임시환 | 누적 상담 1만 건 돌파!</span></p>
    </footer>

    <!-- Floating Footer -->
    <div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl border-t border-slate-100 p-5 flex gap-3 max-w-4xl mx-auto right-0 shadow-lg z-50">
        <a href="tel:01077119870" class="flex-1 magenta-btn text-white py-4 rounded-2xl font-black text-center flex items-center justify-center gap-3 text-xl"><i class="fas fa-phone"></i> 실장님 바로 연결</a>
    </div>

</body>
</html>
